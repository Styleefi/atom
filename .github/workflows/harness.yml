name: harness

on:
  pull_request:
  push:
    branches: [main]

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
      - run: uv sync --directory meta
      - run: uv run --directory meta pytest
      - run: uv run --directory meta python -m harness.rules_checker
